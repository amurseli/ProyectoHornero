server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip para assets de texto (JS/CSS/SVG/JSON) — baja mucho la transferencia
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/ttf font/woff font/woff2;

    # Bundles con hash de contenido (Vite /assets/*): inmutables → cache 1 año.
    # ^~ para que gane sobre el bloque regex de abajo.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Imágenes/fuentes en la raíz (heros, fondos, favicon): mismo nombre entre
    # deploys → cache moderado (7 días) para que un reemplazo propague pronto.
    location ~* \.(?:jpg|jpeg|png|webp|gif|ico|svg|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # HTML del SPA: siempre revalidar, así los deploys nuevos se toman al instante.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
