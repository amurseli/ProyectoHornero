services:
  postgres:
    image: postgres:15-alpine
    container_name: hornero-postgres
    environment:
      POSTGRES_DB: hornero
      POSTGRES_USER: hornero  
      POSTGRES_PASSWORD: hornero123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hornero-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hornero"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: hornero-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - hornero-network

  redis:
    image: redis:7-alpine
    container_name: hornero-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hornero-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hornero-backend
    ports:
      - "8080:8080"
    env_file:
      - .env.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hornero-network
    volumes:
      - ./src:/app/src:ro
      - maven_cache:/root/.m2

volumes:
  postgres_data:
  redis_data:  
  maven_cache:

networks:
  hornero-network:
    driver: bridge
