spring:
  application:
    name: hornero-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hornero}
    username: ${DB_USER:hornero}
    password: ${DB_PASSWORD:hornero123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.hornero: DEBUG