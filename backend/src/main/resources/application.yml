spring:
  application:
    name: hornero-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hornero}
    username: ${DB_USER:hornero}
    password: ${DB_PASSWORD:hornero123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:your-email@gmail.com}
    password: ${EMAIL_PASSWORD:your-app-password}
    from: ${EMAIL_FROM:noreply@proyectohornero.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always

spring.servlet:
  multipart:
    max-file-size: 5MB
    max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET:hornero-secret-key-change-this-in-production-minimum-256-bits-for-security}
  expiration: ${JWT_EXPIRATION:900000} # 15 minutes in milliseconds
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds

# OAuth2 Configuration
spring.security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
          client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
          scope:
            - email
            - profile
          redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
      provider:
        google:
          authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
          token-uri: https://oauth2.googleapis.com/token
          user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          user-name-attribute: sub

# Frontend URL for OAuth redirects
app:
  service-key: ${SERVICE_KEY_PAYMENTS:internal-secret-dev}
  environment: ${APP_ENVIRONMENT:local}
  instance-id: ${APP_INSTANCE_ID:}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  oauth2:
    authorized-redirect-uris:
      - ${FRONTEND_URL:http://localhost:5173}/oauth2/redirect
  testing-mode:
    enabled: ${TEST_MODE_ENABLED:false}

logging:
  level:
    root: INFO
    com.hornero: DEBUG

# AES-256 encryption key (Base64-encoded 32-byte key)
encryption:
  aes-key: ${ENCRYPTION_AES_KEY:dGhpcyBpcyBhIDMyLWJ5dGUga2V5ISEh} # CHANGE IN PRODUCTION

# AWS S3 configuration
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET:hornero-identity-docs}
    region: ${AWS_S3_REGION:sa-east-1}
    access-key: ${AWS_S3_ACCESS_KEY:your-access-key}
    secret-key: ${AWS_S3_SECRET_KEY:your-secret-key}
    root-prefix: ${AWS_S3_ROOT_PREFIX:}
