spring:
  application:
    name: hornero-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hornero}
    username: ${DB_USER:hornero}
    password: ${DB_PASSWORD:hornero123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:hornero-secret-key-change-this-in-production-minimum-256-bits-for-security}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours

logging:
  level:
    root: INFO
    com.hornero: DEBUG