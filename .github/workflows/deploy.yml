name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'payments/**'
      - 'backoffice/**'
      - 'scheduler/**'
      - 'blockchain/**'
      - 'notifications/**'
      - '.github/workflows/deploy.yml'
  # Manual rebuild + redeploy for when a push-triggered deploy missed a service
  # (e.g. a queued/cancelled run). Tick the services to force.
  workflow_dispatch:
    inputs:
      backend:
        description: 'Rebuild & deploy backend'
        type: boolean
        default: false
      frontend:
        description: 'Rebuild & deploy frontend'
        type: boolean
        default: false
      payments:
        description: 'Rebuild & deploy payments'
        type: boolean
        default: false
      backoffice:
        description: 'Rebuild & deploy backoffice'
        type: boolean
        default: false
      scheduler:
        description: 'Rebuild & deploy scheduler'
        type: boolean
        default: false
      blockchain:
        description: 'Rebuild & deploy blockchain'
        type: boolean
        default: false
      notifications:
        description: 'Rebuild & deploy notifications'
        type: boolean
        default: false

concurrency:
  group: deploy-main
  # Queue deploys instead of cancelling: a second push must not abort an
  # in-flight deploy, or that push's changed services never get built.
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.resolve.outputs.backend }}
      frontend: ${{ steps.resolve.outputs.frontend }}
      payments: ${{ steps.resolve.outputs.payments }}
      backoffice: ${{ steps.resolve.outputs.backoffice }}
      scheduler: ${{ steps.resolve.outputs.scheduler }}
      blockchain: ${{ steps.resolve.outputs.blockchain }}
      notifications: ${{ steps.resolve.outputs.notifications }}
      namespace: ${{ steps.namespace.outputs.value }}
    steps:
      # fetch-depth: 0 → historial completo para que paths-filter pueda diffear
      # bien los merge commits contra su base (con checkout shallow el diff falla
      # y marca servicios como "sin cambios" aunque sí cambiaron).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On push, diff the commit to decide which services changed. On manual
      # dispatch there is no diff, so this is skipped and the inputs are used.
      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'push'
        with:
          base: ${{ github.event.before }}
          filters: |
            backend: 'backend/**'
            frontend: 'frontend/**'
            payments: 'payments/**'
            backoffice: 'backoffice/**'
            scheduler: 'scheduler/**'
            blockchain: 'blockchain/**'
            notifications: 'notifications/**'

      # Single source of truth for the build matrix: paths-filter on push, the
      # checkbox inputs on workflow_dispatch.
      - name: Resolve services to build
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=${{ inputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ inputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "payments=${{ inputs.payments }}" >> "$GITHUB_OUTPUT"
            echo "backoffice=${{ inputs.backoffice }}" >> "$GITHUB_OUTPUT"
            echo "scheduler=${{ inputs.scheduler }}" >> "$GITHUB_OUTPUT"
            echo "blockchain=${{ inputs.blockchain }}" >> "$GITHUB_OUTPUT"
            echo "notifications=${{ inputs.notifications }}" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.changes.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.changes.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "payments=${{ steps.changes.outputs.payments }}" >> "$GITHUB_OUTPUT"
            echo "backoffice=${{ steps.changes.outputs.backoffice }}" >> "$GITHUB_OUTPUT"
            echo "scheduler=${{ steps.changes.outputs.scheduler }}" >> "$GITHUB_OUTPUT"
            echo "blockchain=${{ steps.changes.outputs.blockchain }}" >> "$GITHUB_OUTPUT"
            echo "notifications=${{ steps.changes.outputs.notifications }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Normalize GHCR namespace
        id: namespace
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
          - service: payments
            context: ./payments
          - service: backoffice
            context: ./backoffice
          - service: scheduler
            context: ./scheduler
          - service: blockchain
            context: ./blockchain/ledger
          - service: notifications
            context: ./notifications

    steps:
      - name: Skip unchanged service
        if: needs.detect.outputs[matrix.service] != 'true'
        run: echo "No changes for ${{ matrix.service }}"

      - uses: actions/checkout@v4
        if: needs.detect.outputs[matrix.service] == 'true'

      - uses: docker/login-action@v3
        if: needs.detect.outputs[matrix.service] == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: needs.detect.outputs[matrix.service] == 'true'

      - name: Write frontend env file
        if: needs.detect.outputs[matrix.service] == 'true' && matrix.service == 'frontend'
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: printf '%s\n' "$FRONTEND_ENV" > ./frontend/.env.frontend

      - name: Write backoffice env file
        if: needs.detect.outputs[matrix.service] == 'true' && matrix.service == 'backoffice'
        env:
          BACKOFFICE_ENV: ${{ secrets.BACKOFFICE_ENV }}
        run: printf '%s\n' "$BACKOFFICE_ENV" > ./backoffice/.env.backoffice

      - name: Build and push image
        if: needs.detect.outputs[matrix.service] == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ needs.detect.outputs.namespace }}/hornero-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [detect, build]
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH private key
        env:
          SSH_KEY: ${{ secrets.BACKEND_SSH_KEY }}
        run: |
          printf "%s" "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          GHCR_NAMESPACE: ${{ needs.detect.outputs.namespace }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_CHANGED: ${{ needs.detect.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.detect.outputs.frontend }}
          PAYMENTS_CHANGED: ${{ needs.detect.outputs.payments }}
          BACKOFFICE_CHANGED: ${{ needs.detect.outputs.backoffice }}
          SCHEDULER_CHANGED: ${{ needs.detect.outputs.scheduler }}
          BLOCKCHAIN_CHANGED: ${{ needs.detect.outputs.blockchain }}
          NOTIFICATIONS_CHANGED: ${{ needs.detect.outputs.notifications }}
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "${EC2_USER}@${BACKEND_HOST}" <<EOF
          set -e
          cd /home/${EC2_USER}/ProyectoHornero
          git pull --ff-only origin main
          docker network inspect hornero-network >/dev/null 2>&1 || docker network create hornero-network
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          export GHCR_NAMESPACE="${GHCR_NAMESPACE}"

          if [ "${BACKEND_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/backend
            docker compose pull backend
            docker compose up -d backend
          fi

          if [ "${PAYMENTS_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/payments
            docker compose pull payments
            docker compose up -d payments
          fi

          if [ "${FRONTEND_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/frontend
            docker compose pull frontend
            docker compose up -d frontend
          fi

          if [ "${BACKOFFICE_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/backoffice
            docker compose pull backoffice
            docker compose up -d backoffice
          fi

          if [ "${BLOCKCHAIN_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/blockchain
            docker compose -f compose.yaml pull ledger-service
            docker compose -f compose.yaml up -d ledger-service
          fi

          if [ "${SCHEDULER_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/scheduler
            docker compose pull scheduler
            docker compose up -d scheduler
          fi

          if [ "${NOTIFICATIONS_CHANGED}" = "true" ]; then
            cd /home/${EC2_USER}/ProyectoHornero/notifications
            docker compose pull notifications
            docker compose up -d notifications
          fi

          # Reclaim disk: drop dangling images left behind by pulling :latest.
          docker image prune -f
          EOF

      - name: Remove SSH key
        if: always()
        run: rm -f /tmp/deploy_key
