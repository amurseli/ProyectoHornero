name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      payments: ${{ steps.changes.outputs.payments }}
      backoffice: ${{ steps.changes.outputs.backoffice }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend: 'backend/**'
            frontend: 'frontend/**'
            payments: 'payments/**'
            backoffice: 'backoffice/**'

  build:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, payments, backoffice]
    steps:
      - name: Skip if unchanged
        if: needs.detect.outputs[matrix.service] != 'true'
        run: echo "No changes" && exit 0

      - uses: actions/checkout@v4
        if: needs.detect.outputs[matrix.service] == 'true'

      - uses: docker/login-action@v3
        if: needs.detect.outputs[matrix.service] == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        if: needs.detect.outputs[matrix.service] == 'true'
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hornero-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [detect, build]
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        env:
          SSH_KEY: ${{ secrets.BACKEND_SSH_KEY }}
          EC2_USER: ${{ secrets.EC2_USER }}
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
        run: |
          printf "%s" "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "${EC2_USER}@${BACKEND_HOST}" <<EOF
          set -e
          cd /home/${EC2_USER}/ProyectoHornero
          git pull --ff-only origin main
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          for svc in backend frontend payments backoffice; do
            cd /home/${EC2_USER}/ProyectoHornero/\$svc
            docker compose pull
            docker compose up -d
          done
          EOF
          rm -f /tmp/deploy_key