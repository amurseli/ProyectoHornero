services:
  ledger-service:
    build:
      context: ./ledger
      dockerfile: Dockerfile
    container_name: hornero-ledger-service
    env_file:
      - ./ledger/.env
    environment:
      SERVER_PORT: 8080
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - hornero-network

networks:
  hornero-network:
    external: true
