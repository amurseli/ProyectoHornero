# ============================================================
# Hornero Payments Service - Configuration
# ============================================================

# Server Configuration
server.port=8081
spring.application.name=hornero-payments

# Database Configuration (misma DB que backend por ahora - monolito modular)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hornero}
spring.datasource.username=${DATABASE_USER:hornero}
spring.datasource.password=${DATABASE_PASSWORD:hornero123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=payments

# Flyway - gestiona el schema 'payments' de forma autonoma
spring.flyway.schemas=payments
spring.flyway.default-schema=payments
spring.flyway.locations=classpath:db/migration

# MercadoPago Configuration
mercadopago.access-token=${MP_ACCESS_TOKEN:TEST-your-access-token-here}
mercadopago.public-key=${MP_PUBLIC_KEY:TEST-your-public-key-here}

# Application URLs (para redirects de MercadoPago)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.payments.url=${PAYMENTS_URL:http://localhost:8081}
app.blockchain.url=${BLOCKCHAIN_URL:http://localhost:8082}

# Auth interna entre servicios
app.service-key=${SERVICE_KEY_PAYMENTS:internal-secret-dev}

# JWT - mismo secret que el backend para parsear tokens (mismo nombre de property)
jwt.secret=${JWT_SECRET:hornero-secret-key-change-this-in-production-minimum-256-bits}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}

# Actuator Configuration (health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Comisiones (ajustar luego, probablemente al comision del provider se extraiga de otro lugar)
app.fees.platform-rate=0.05
app.fees.provider-rate=0.0299

# Logging
logging.level.com.hornero.payments=INFO
logging.level.com.mercadopago=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
