services:
  payments:
    image: ghcr.io/${GHCR_NAMESPACE:-proyectohornero}/hornero-payments:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hornero-payments
    ports:
      - "8081:8081"
    env_file:
      - .env.payments
    environment:
      DATABASE_URL: jdbc:postgresql://hornero-postgres:5432/${DB_NAME:-hornero}
      DATABASE_USER: ${DB_USER:-hornero}
      DATABASE_PASSWORD: ${DB_PASSWORD:-hornero123}
      BLOCKCHAIN_URL: ${BLOCKCHAIN_URL:-http://hornero-ledger-service:8080}
      REDIS_HOST: ${REDIS_HOST:-hornero-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - hornero-network
    restart: unless-stopped

networks:
  hornero-network:
    external: true
