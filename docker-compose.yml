version: '3.8'

services:
  # PostgreSQL Database (compartida por backend y payments)
  postgres:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-hornero-postgres}
    environment:
      POSTGRES_DB: ${DB_NAME:-hornero}
      POSTGRES_USER: ${DB_USER:-hornero}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hornero123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hornero-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hornero}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service (Core API - Campaigns, Users, Auth)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME:-hornero-backend}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - ./backend/.env.backend
    environment:
      # Database
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-hornero}
      DATABASE_USER: ${DB_USER:-hornero}
      DATABASE_PASSWORD: ${DB_PASSWORD:-hornero123}
      # Services URLs
      PAYMENTS_SERVICE_URL: ${PAYMENTS_SERVICE_URL:-http://payments:8081}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hornero-network
    restart: unless-stopped

  # Payments Service (MercadoPago Integration)
  payments:
    build:
      context: ./payments
      dockerfile: Dockerfile
    container_name: ${PAYMENTS_CONTAINER_NAME:-hornero-payments}
    ports:
      - "${PAYMENTS_PORT:-8081}:8081"
    environment:
      # Database
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-hornero}
      DATABASE_USER: ${DB_USER:-hornero}
      DATABASE_PASSWORD: ${DB_PASSWORD:-hornero123}
      # MercadoPago
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      # Services URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hornero-network
    restart: unless-stopped

networks:
  hornero-network:
    driver: bridge

volumes:
  postgres_data: