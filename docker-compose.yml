version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hornero-postgres
    environment:
      POSTGRES_DB: hornero
      POSTGRES_USER: hornero  
      POSTGRES_PASSWORD: hornero123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hornero-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hornero"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hornero-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hornero-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: hornero-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hornero
      DB_USER: hornero
      DB_PASSWORD: hornero123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hornero-network
    volumes:
      - ./src:/app/src:ro
      - maven_cache:/root/.m2



  frontend:
    build: ./frontend
    container_name: hornero-frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.frontend
    depends_on:
      - backend
    networks:
      - hornero-network

volumes:
  postgres_data:
  redis_data:
  maven_cache:

networks:
  hornero-network:
    driver: bridge
