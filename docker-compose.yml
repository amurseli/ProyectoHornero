version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hornero_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hornero_db
      - POSTGRES_USER=hornero_user
      - POSTGRES_PASSWORD=hornero_pass
    ports:
      - "5432:5432"
    networks:
      - hornero_network

  redis:
    image: redis:7-alpine
    container_name: hornero_redis
    ports:
      - "6379:6379"
    networks:
      - hornero_network

  backend:
    build: ./backend
    container_name: hornero_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    networks:
      - hornero_network

  frontend:
    build: ./frontend
    container_name: hornero_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.frontend
    depends_on:
      - backend
    networks:
      - hornero_network

volumes:
  postgres_data:

networks:
  hornero_network:
    driver: bridge