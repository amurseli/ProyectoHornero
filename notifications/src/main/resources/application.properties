# ============================================================
# Hornero Notifications Service - Configuration
# ============================================================

# Server Configuration
server.port=8083
spring.application.name=hornero-notifications

# Database Configuration (misma DB que backend/payments - monolito modular)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hornero}
spring.datasource.username=${DATABASE_USER:hornero}
spring.datasource.password=${DATABASE_PASSWORD:hornero123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=notifications

# Flyway - gestiona el schema 'notifications' de forma autonoma
spring.flyway.schemas=notifications
spring.flyway.default-schema=notifications
spring.flyway.locations=classpath:db/migration

# Redis - consumo de eventos via Redis Streams (publicados por backend y payments)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Mail Configuration (mismo proveedor SMTP que el backend)
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Remitente y destinatario admin para mails de notificaciones
app.email.from=${EMAIL_FROM:noreply@proyectohornero.com}
app.admin.email=${ADMIN_EMAIL:admin@proyectohornero.com}

# JWT - mismo secret que el backend para parsear tokens (mismo nombre de property)
jwt.secret=${JWT_SECRET:hornero-secret-key-change-this-in-production-minimum-256-bits}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}

# Redis Stream - nombre del stream y grupo de consumidores de notificaciones
app.notifications.stream-key=${NOTIFICATIONS_STREAM_KEY:hornero:notifications:events}
app.notifications.consumer-group=${NOTIFICATIONS_CONSUMER_GROUP:notifications-group}

# Actuator Configuration (health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.hornero.notifications=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
